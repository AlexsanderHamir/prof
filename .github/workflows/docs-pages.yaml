# Deploy static docs to GitHub Pages. Requires: Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "prof_web_doc/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: prof_web_doc/requirements.txt

      - name: Install MkDocs
        run: pip install -r prof_web_doc/requirements.txt

      - name: Build site
        run: mkdocs build --strict -f prof_web_doc/mkdocs.yml

      - uses: actions/upload-pages-artifact@v3
        with:
          path: prof_web_doc/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
