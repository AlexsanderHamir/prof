# Deploy static docs to GitHub Pages. Requires: Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "prof_web_doc/**"
      - ".github/workflows/docs-pages.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: prof_web_doc/requirements.txt

      - name: Install MkDocs
        run: pip install -r prof_web_doc/requirements.txt

      - name: Build site
        run: mkdocs build --strict -f prof_web_doc/mkdocs.yml

      - uses: actions/upload-pages-artifact@v4
        with:
          path: prof_web_doc/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      # deploy-pages runs on Node 24; silence upstream punycode DEP0040 until action deps update.
      NODE_OPTIONS: --disable-warning=DEP0040
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    timeout-minutes: 15
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
        with:
          # Poll longer on transient Pages backend failures (see actions/deploy-pages#418).
          reporting_interval: 10000
          error_count: 15

      - name: Retry Pages deploy after transient failure
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v5
        with:
          reporting_interval: 10000
          error_count: 15

      - name: Require successful Pages deploy
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed after two attempts."
          echo "Re-run this workflow from Actions, or check Settings → Pages → Source: GitHub Actions."
          exit 1
