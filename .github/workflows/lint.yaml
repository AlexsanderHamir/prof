# Lint checks (local equivalents):
#   go install golang.org/x/lint/golint@latest
#   golint -set_exit_status ./...
#   golangci-lint run ./...
name: Linters

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "**.txt"
      - "prof_web_doc/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "**.txt"
      - "prof_web_doc/**"

permissions:
  contents: read

jobs:
  lint:
    name: Run Go Linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"
          cache: true

      - name: Run golint
        run: |
          go install golang.org/x/lint/golint@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          golint -set_exit_status ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.7
          args: --timeout=5m
