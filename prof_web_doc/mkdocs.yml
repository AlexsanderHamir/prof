site_name: Prof documentation
site_description: Go benchmark profiling with prof ui menus and bench output under .prof/.
site_url: https://alexsanderhamir.github.io/prof/

repo_url: https://github.com/AlexsanderHamir/prof
repo_name: prof
edit_uri: edit/main/prof_web_doc/docs/

theme:
  name: material
  font: false
  language: en
  logo: assets/prof_logo_v0.0.1.png
  favicon: assets/prof_logo_v0.0.1.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting started:
      - Install Prof: install.md
      - Quickstart: quickstart.md
  - Guides:
      - Working directory and paths: workspace.md
      - Collect profiling data: collect.md
      - Configure collection: configure.md
      - Interactive UI and TUI: tui.md
  - Reference:
      - CLI reference: cli-reference.md
      - Troubleshooting: troubleshooting.md

markdown_extensions:
  - tables
  - fenced_code
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - toc:
      permalink: true

plugins:
  - search:
      lang: en
