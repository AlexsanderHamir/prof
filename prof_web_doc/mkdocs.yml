site_name: Prof documentation
site_description: Go benchmark profiling with prof ui menus, bench output under bench/, compare runs; flags for CI when you want them.
site_url: https://alexsanderhamir.github.io/prof/

repo_url: https://github.com/AlexsanderHamir/prof
repo_name: prof
edit_uri: ""

theme:
  name: material
  language: en
  logo: assets/prof_logo.png
  favicon: assets/prof_logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Overview: index.md
  - Install Prof: install.md
  - Quickstart: quickstart.md
  - Paths and cwd: workspace.md
  - Collect: collect.md
  - Configure: configure.md
  - Compare: compare.md
  - UI and TUI: tui.md
  - CI: ci.md
  - Tools: tools.md

markdown_extensions:
  - tables
  - fenced_code
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search:
      lang: en
